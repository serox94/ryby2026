<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACTICAL FISHING V7 | PRO-ANALYTICS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-green: #00ff88;
            --neon-blue: #00d2ff;
            --danger: #ff4757;
            --accent: #ffb800;
            --bg-dark: #0a0c0f;
            --glass: rgba(16, 20, 24, 0.95);
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-dark); color: #fff;
            background-image: radial-gradient(circle at 20% 30%, rgba(0, 255, 136, 0.05) 0%, transparent 40%);
            min-height: 100vh; overflow-x: hidden;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 30px 30px; z-index: -1;
        }

        header { padding: 30px 20px; text-align: center; }
        .header-title { font-family: 'Orbitron', sans-serif; font-size: clamp(1.2rem, 4vw, 2.5rem); letter-spacing: 4px; background: linear-gradient(90deg, #fff, var(--neon-green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin:0; }

        .status-bar { background: rgba(0,0,0,0.8); border-top: 1px solid var(--neon-green); border-bottom: 1px solid var(--neon-green); padding: 10px; display: flex; justify-content: center; gap: 20px; font-family: 'Orbitron', sans-serif; font-size: 0.8rem; color: var(--neon-green); }

        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; padding: 20px; max-width: 1400px; margin: auto; }

        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.05); border-top: 3px solid var(--neon-blue); border-radius: 4px; padding: 20px; }
        .card h2 { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; color: var(--neon-blue); margin-top: 0; display: flex; align-items: center; gap: 10px; text-transform: uppercase; letter-spacing: 1px; }

        /* PB System */
        .pb-wrapper { margin-bottom: 25px; }
        .pb-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 5px; }
        .pb-name { font-size: 0.75rem; color: #fff; font-weight: 800; text-transform: uppercase; }
        .pb-total { font-size: 0.7rem; color: var(--neon-green); font-family: 'Orbitron'; }
        .pb-container { background: rgba(0,0,0,0.5); border-radius: 4px; height: 22px; position: relative; overflow: hidden; border: 1px solid #333; }
        .pb-bar { height: 100%; background: linear-gradient(90deg, var(--neon-blue), var(--neon-green)); width: 0%; transition: 1s ease; }
        .pb-text { position: absolute; width: 100%; text-align: center; font-size: 0.7rem; font-weight: 900; line-height: 22px; color: #fff; text-shadow: 1px 1px 2px #000; }

        /* Form Elements */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 4px; font-family: 'Inter'; box-sizing: border-box; font-size: 0.9rem; }
        button { background: var(--neon-green); color: #000; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        button.btn-add { width: auto; padding: 10px 20px; margin: 0; }
        button.btn-del { background: var(--danger); width: 30px; height: 30px; padding: 0; margin: 0; font-size: 0.7rem; color: white; }

        /* History List */
        .catch-item { background: rgba(255,255,255,0.03); padding: 12px; margin-bottom: 8px; border-left: 3px solid var(--neon-green); display: flex; justify-content: space-between; align-items: center; }
        .catch-main { font-weight: bold; font-size: 1.1rem; color: var(--accent); }
        .catch-sub { font-size: 0.7rem; color: #888; margin-top: 3px; }

        /* Inventory */
        .inv-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .inv-form { display: flex; gap: 5px; margin-bottom: 15px; }

        @media (max-width: 600px) { .dashboard { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <div class="header-title">OPERATION: STEK 2</div>
    <div style="color: #666; font-size: 0.7rem; letter-spacing: 2px;">PRO-ANALYTICS DASHBOARD V7</div>
</header>

<div class="status-bar">
    <span id="countdown">T-MINUS: --D --H</span>
    <span><i class="fas fa-microchip"></i> ANALYTICS ACTIVE</span>
</div>

<div class="dashboard">
    <div class="card" style="border-top-color: var(--neon-green);">
        <h2><i class="fas fa-plus-square"></i> Rejestracja Danych</h2>
        <select id="fisher">
            <option value="Patryk">OPERATOR: PATRYK</option>
            <option value="Maciek">OPERATOR: MACIEK</option>
        </select>
        <div class="form-row">
            <input type="text" id="species" placeholder="Gatunek">
            <input type="number" step="0.1" id="weight" placeholder="Waga (kg)">
        </div>
        <div class="form-row">
            <input type="text" id="bait" placeholder="Przynęta">
            <input type="number" id="spot" placeholder="Spot (#)">
        </div>
        <button onclick="addFish()">LOGUJ POŁÓW</button>
        <div id="catch-history" style="margin-top: 20px; max-height: 350px; overflow-y: auto;"></div>
    </div>

    <div class="card">
        <h2><i class="fas fa-chart-bar"></i> Wyniki Operacyjne</h2>
        
        <div class="pb-wrapper">
            <div class="pb-header">
                <span class="pb-name">PATRYK</span>
                <span class="pb-total" id="sum-patryk">SUMA: 0.0 KG</span>
            </div>
            <div class="pb-container">
                <div class="pb-bar" id="pb-patryk"></div>
                <div class="pb-text" id="txt-patryk">PB: 0.0 KG / 0%</div>
            </div>
        </div>

        <div class="pb-wrapper">
            <div class="pb-header">
                <span class="pb-name">MACIEK</span>
                <span class="pb-total" id="sum-maciek">SUMA: 0.0 KG</span>
            </div>
            <div class="pb-container">
                <div class="pb-bar" id="pb-maciek"></div>
                <div class="pb-text" id="txt-maciek">PB: 0.0 KG / 0%</div>
            </div>
        </div>

        <div style="font-size: 0.7rem; color: #555; border-top: 1px solid #222; padding-top: 15px; margin-top: 10px;">
            <i class="fas fa-bullseye"></i> TARGET PB: 20.0 KG<br>
            <i class="fas fa-location-arrow"></i> Sektor: La Plaine des Bois 2
        </div>
    </div>

    <div class="card" style="border-top-color: var(--accent);">
        <h2><i class="fas fa-boxes"></i> Inwentarz Taktyczny</h2>
        <div class="inv-form">
            <input type="text" id="inv-name" placeholder="Przedmiot">
            <input type="text" id="inv-qty" placeholder="Ilość" style="width: 80px;">
            <button class="btn-add" onclick="addInv()">+</button>
        </div>
        <div id="inv-list"></div>
    </div>
</div>

<script>
    const TARGET_PB = 20.0;

    // Countdown
    const tripDate = new Date("June 20, 2026 12:00:00").getTime();
    function updateCountdown() {
        const diff = tripDate - new Date().getTime();
        const d = Math.floor(diff / (1000*60*60*24));
        const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
        document.getElementById("countdown").innerHTML = `T-MINUS: ${d}D ${h}H`;
    }
    setInterval(updateCountdown, 60000);
    updateCountdown();

    function addFish() {
        const fish = {
            id: Date.now(),
            who: document.getElementById('fisher').value,
            what: document.getElementById('species').value || 'Karp',
            kg: parseFloat(document.getElementById('weight').value),
            bait: document.getElementById('bait').value || '-',
            spot: document.getElementById('spot').value || '?',
            fullDate: new Date().toLocaleString('pl-PL', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})
        };
        if(isNaN(fish.kg)) return alert("Podaj wagę!");
        let catches = JSON.parse(localStorage.getItem('ryby_v7_data') || "[]");
        catches.unshift(fish);
        localStorage.setItem('ryby_v7_data', JSON.stringify(catches));
        document.getElementById('weight').value = '';
        renderAll();
    }

    function addInv() {
        const name = document.getElementById('inv-name').value;
        const qty = document.getElementById('inv-qty').value;
        if(!name) return;
        let inv = JSON.parse(localStorage.getItem('ryby_v7_inv') || "[]");
        inv.push({id: Date.now(), name, qty});
        localStorage.setItem('ryby_v7_inv', JSON.stringify(inv));
        document.getElementById('inv-name').value = '';
        document.getElementById('inv-qty').value = '';
        renderAll();
    }

    function delInv(id) {
        let inv = JSON.parse(localStorage.getItem('ryby_v7_inv') || "[]");
        inv = inv.filter(item => item.id !== id);
        localStorage.setItem('ryby_v7_inv', JSON.stringify(inv));
        renderAll();
    }

    function renderAll() {
        const catches = JSON.parse(localStorage.getItem('ryby_v7_data') || "[]");
        document.getElementById('catch-history').innerHTML = catches.map(f => `
            <div class="catch-item">
                <div>
                    <div class="catch-main">${f.kg} KG</div>
                    <div class="catch-sub">${f.who} | ${f.what}</div>
                    <div class="catch-sub">Zanęta: ${f.bait} | Spot: #${f.spot}</div>
                </div>
                <div style="text-align:right; font-size:0.6rem; color:#555;">${f.fullDate}</div>
            </div>
        `).join('');

        const updateStats = (name, barId, txtId, sumId) => {
            const userFish = catches.filter(f => f.who === name).map(f => f.kg);
            const max = userFish.length > 0 ? Math.max(...userFish) : 0;
            const total = userFish.reduce((a, b) => a + b, 0);
            const pct = Math.min((max / TARGET_PB) * 100, 100).toFixed(1);
            
            document.getElementById(barId).style.width = pct + '%';
            document.getElementById(txtId).innerHTML = `PB: ${max.toFixed(1)} KG / ${pct}%`;
            document.getElementById(sumId).innerHTML = `SUMA: ${total.toFixed(1)} KG`;
        };
        updateStats('Patryk', 'pb-patryk', 'txt-patryk', 'sum-patryk');
        updateStats('Maciek', 'pb-maciek', 'txt-maciek', 'sum-maciek');

        const inv = JSON.parse(localStorage.getItem('ryby_v7_inv') || "[]");
        document.getElementById('inv-list').innerHTML = inv.map(i => `
            <div class="inv-item">
                <span>${i.name} <small style="color:var(--neon-green)">(${i.qty})</small></span>
                <button class="btn-del" onclick="delInv(${i.id})">X</button>
            </div>
        `).join('');
    }
    renderAll();
</script>

</body>
</html>
