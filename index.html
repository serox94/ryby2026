<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DreamTeam '26 - La Plaine des Bois 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --dark-bg: #07090b; /* Głęboka czerń */
            --glass-bg: rgba(26, 31, 36, 0.7); /* Półprzezroczyste karty */
            --primary: #00ff88; /* Jaskrawa, cyfrowa zieleń */
            --sonar-blue: #00d2ff; /* Taktyczny błękit dla echosondy */
            --danger: #ff4757; 
            --accent: #ffb800; /* Złoty dla PB */
            --text: #ffffff;
            --text-secondary: #aab2bd;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            /* Subtelne tło z wodą w głębi */
            background-image: linear-gradient(rgba(7, 9, 11, 0.95), rgba(7, 9, 11, 0.95)), url('https://images.unsplash.com/photo-1544211158-b78f44d8c83a?q=80&w=600');
            background-size: cover;
            background-attachment: fixed;
            color: var(--text);
            margin: 0;
            padding-bottom: 90px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Premium Header z Parallax */
        header {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(7, 9, 11, 1)), 
                        url('https://lodgingcarp.com/wp-content/uploads/2020/03/la-plaine-des-bois-etang-2-header.jpg');
            background-size: cover;
            background-position: center;
            height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        header .team-label { font-size: 0.7rem; letter-spacing: 3px; color: var(--primary); font-weight: 800; margin-bottom: 5px; }
        header h1 { margin: 0; font-size: 1.6rem; font-weight: 800; text-transform: uppercase; }

        /* Licznik w osobnym pasku */
        .countdown-bar {
            background: rgba(255, 184, 0, 0.1);
            color: var(--accent);
            text-align: center;
            padding: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            border-bottom: 1px solid rgba(255, 184, 0, 0.2);
        }

        .container { padding: 15px; max-width: 480px; margin: auto; }

        /* Stylowe Karty Glassmorphism */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px); /* EFEKT SZKŁA */
            -webkit-backdrop-filter: blur(10px);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h2 { color: var(--text); margin-top: 0; font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 12px; }
        h2 i { color: var(--sonar-blue); }

        /* Taktyczna lista zasad */
        .rules-list { list-style: none; padding: 0; margin: 0; font-size: 0.9rem; color: var(--text-secondary); }
        .rules-list li { margin-bottom: 12px; display: flex; align-items: flex-start; gap: 10px; line-height: 1.4; }
        .rule-important { color: var(--danger); font-weight: 600; }
        .rule-icon { color: var(--primary); width: 18px; text-align: center; margin-top: 2px; }

        /* Nowoczesne Formularze */
        .form-group { margin-bottom: 10px; }
        label { font-size: 0.8rem; color: var(--text-secondary); margin-left: 5px; }
        input, select, button {
            width: 100%; padding: 14px; margin: 5px 0;
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.03); color: white; font-size: 1rem; font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }
        input:focus, select:focus { outline: none; border-color: var(--sonar-blue); }
        
        button { background: var(--primary); color: #000; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; margin-top: 15px;}
        button:active { transform: scale(0.97); opacity: 0.9; }

        /* Wpisy w dzienniku */
        .catch-item {
            background: rgba(255,255,255,0.02); padding: 15px; border-radius: 12px; margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.03);
            display: flex; justify-content: space-between; align-items: center;
        }
        .catch-species { font-weight: 700; font-size: 1rem; }
        .catch-weight { color: var(--accent); font-weight: 800; font-size: 1.1rem; }
        .catch-info { font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px; }

        /* Taktyczna Nawigacja Dolna */
        nav {
            position: fixed; bottom: 15px; left: 15px; right: 15px;
            background: rgba(13, 16, 20, 0.9); backdrop-filter: blur(15px);
            display: flex; justify-content: space-around;
            padding: 10px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05); z-index: 1000;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .nav-btn { color: #57606f; text-decoration: none; text-align: center; font-size: 0.7rem; font-weight: 600; flex: 1; transition: 0.2s; }
        .nav-btn.active { color: var(--primary); }
        .nav-btn i { display: block; font-size: 1.3rem; margin-bottom: 5px; transition: 0.2s; }
        .nav-btn.active i { transform: translateY(-3px); }

        .page { display: none; }
        .page.active { display: block; animation: pageIn 0.4s ease-out; }

        @keyframes pageIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div class="team-label">DREAM TEAM '26</div>
    <h1>Plaine des Bois 2</h1>
</header>
<div id="timer" class="countdown-bar">Ładowanie operacji...</div>

<div class="container">
    
    <div id="page-home" class="page active">
